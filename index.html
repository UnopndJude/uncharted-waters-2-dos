<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대항해시대2 - DOS</title>
  <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #dos { width: 100vw; height: 100vh; }
    #intro { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 1rem; padding: 2rem; text-align: center; }
    #intro h1 { margin: 0; font-size: 1.5rem; }
    #intro p { margin: 0; color: #aaa; max-width: 40rem; line-height: 1.6; }
    #intro code { background: #222; padding: 0.2em 0.4em; border-radius: 4px; }
    #intro button { padding: 0.75rem 1.5rem; font-size: 1rem; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
    #intro button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div id="dos">
    <div id="intro">
      <h1>대항해시대2 (DOS) 웹 에뮬레이터</h1>
      <p>
        로컬에 <code>game.jsdos</code> 파일을 배치하면 자동으로 실행됩니다.<br>
        파일이 없을 경우 아래 버튼으로 직접 업로드할 수 있습니다.
      </p>
      <input type="file" id="bundle-input" accept=".jsdos,.zip" style="display:none">
      <button onclick="document.getElementById('bundle-input').click()">게임 번들 업로드</button>
      <p style="font-size: 0.85rem; color: #666;">
        ※ 본인이 정식 보유한 게임 파일만 사용하세요.
      </p>
    </div>
  </div>

  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <script>
    const dosEl = document.getElementById("dos");
    const bundleUrl = "game.jsdos";

    async function bootFromUrl(url) {
      dosEl.innerHTML = "";
      Dos(dosEl, {
        url,
        theme: "dark",
      });
    }

    async function bootFromFile(file) {
      const url = URL.createObjectURL(file);
      bootFromUrl(url);
    }

    document.getElementById("bundle-input").addEventListener("change", (e) => {
      if (e.target.files[0]) bootFromFile(e.target.files[0]);
    });

    fetch(bundleUrl, { method: "HEAD" })
      .then((res) => { if (res.ok) bootFromUrl(bundleUrl); })
      .catch(() => {});
  </script>
</body>
</html>
